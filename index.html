<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<title>Para Rose ❤️</title>

<style>
body {
  margin: 0;
  height: 100vh;
  background: linear-gradient(270deg, #ff9a9e, #fad0c4, #fbc2eb);
  background-size: 600% 600%;
  animation: gradient 10s ease infinite;
  overflow: hidden;
  font-family: Arial, sans-serif;
  display: flex;
  align-items: center;
  justify-content: center;
  color: white;
}

@keyframes gradient {
  0% { background-position: 0% 50%; }
  50% { background-position: 100% 50%; }
  100% { background-position: 0% 50%; }
}

.start {
  text-align: center;
}

button {
  padding: 15px 30px;
  border: none;
  border-radius: 12px;
  font-size: 18px;
  background: #ff4d6d;
  color: white;
  cursor: pointer;
  transition: transform 0.2s;
}

button:hover {
  transform: scale(1.1);
}

.card {
  display: none;
  background: rgba(255,255,255,0.15);
  padding: 40px;
  border-radius: 20px;
  max-width: 500px;
  backdrop-filter: blur(10px);
  text-align: center;
  animation: fadeIn 2s ease;
}

@keyframes fadeIn {
  from { opacity: 0; transform: translateY(20px);}
  to { opacity: 1; transform: translateY(0);}
}

.text span {
  opacity: 0;
  display: inline-block;
  animation: appear 0.05s forwards;
}

@keyframes appear {
  to { opacity: 1; }
}

.heart {
  position: absolute;
  font-size: 20px;
  animation: fall linear infinite;
}

@keyframes fall {
  to {
    transform: translateY(100vh);
  }
}
</style>
</head>

<body>

<div class="start" id="start">
  <h2>Tenho uma coisinha pra você...</h2>
  <button onclick="iniciar()">Clique aqui ❤️</button>
</div>

<div class="card" id="card">
  <h1>Rose ❤️</h1>
  <p class="text" id="texto"></p>
</div>

<script>
const mensagem = `Eu pensei em você agora...

E percebi que tem algo em você que me traz uma paz absurda.

Estar com você é leve... é bom... é diferente.

E só de você ser quem é, já me inspira a querer ser melhor todos os dias.

Você é muito especial pra mim. 💕`;

function iniciar() {
  document.getElementById("start").style.display = "none";
  document.getElementById("card").style.display = "block";

  // abre música
  window.open("https://www.youtube.com/watch?v=Oa_RSwwpPaA", "_blank");

  escreverTexto();
  coracoes();
}

function escreverTexto() {
  const container = document.getElementById("texto");

  mensagem.split("").forEach((letra, i) => {
    const span = document.createElement("span");
    span.innerHTML = letra;
    span.style.animationDelay = i * 0.03 + "s";
    container.appendChild(span);
  });
}

function coracoes() {
  setInterval(() => {
    const heart = document.createElement("div");
    heart.classList.add("heart");
    heart.innerHTML = "❤️";
    heart.style.left = Math.random() * 100 + "vw";
    heart.style.animationDuration = (Math.random() * 3 + 2) + "s";

    document.body.appendChild(heart);

    setTimeout(() => heart.remove(), 5000);
  }, 250);
}
</script>

</body>
</html>
